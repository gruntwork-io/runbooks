name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: just build

      # Fetch boilerplate for the *target* arch, not the runner's arch. The
      # matrix runs both arm64 and x64 builds on macos-latest (arm64), so the
      # x64 job must cross-fetch amd64 — host detection would mis-bundle it.
      - name: Fetch boilerplate
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          case "$MATRIX_ARCH" in
            arm64) bp_arch=arm64 ;;
            x64)   bp_arch=amd64 ;;
            *) echo "Unhandled matrix.arch: $MATRIX_ARCH" >&2; exit 1 ;;
          esac
          just fetch-boilerplate darwin "$bp_arch"

      - name: Package for macOS
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.MACOS_AC_LOGIN }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_AC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_AC_PROVIDER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EB_ARCH: ${{ matrix.arch }}
        run: |
          # Only enable code signing when a certificate is actually configured.
          # An empty CSC_LINK is treated by electron-builder as a file path that
          # resolves to the project root, failing with "<projectDir> not a file".
          if [ -n "$MACOS_CERTIFICATE" ]; then
            export CSC_LINK="$MACOS_CERTIFICATE"
            export CSC_KEY_PASSWORD="$MACOS_CERTIFICATE_PASSWORD"
          else
            echo "No MACOS_CERTIFICATE secret set; building an unsigned macOS app."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          mise x node -- npx electron-builder --mac --${EB_ARCH}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            out/*.dmg
            out/*.zip
            out/*.blockmap
            out/latest-mac*.yml
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: just build

      - name: Fetch boilerplate
        run: just fetch-boilerplate linux amd64

      - name: Package for Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise x node -- npx electron-builder --linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            out/*.AppImage
            out/*.deb
            out/*.blockmap
            out/latest-linux*.yml
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: just build

      - name: Fetch boilerplate
        shell: bash
        run: just fetch-boilerplate windows amd64

      - name: Package for Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise x node -- npx electron-builder --win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            out/*.exe
            out/*.blockmap
            out/latest*.yml
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.zip *.AppImage *.deb *.exe 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/*.yml
            artifacts/SHA256SUMS
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
