name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: oxlint .

      - name: Typecheck
        run: tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend unit tests
        run: bun test --path-ignore-patterns='web/**' --path-ignore-patterns='docs/**' --path-ignore-patterns='node_modules/**' --path-ignore-patterns='**/e2e/**'

      - name: Run web unit tests
        run: cd web && vitest run --reporter=verbose

  test-build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron app
        run: electron-vite build

  test-e2e:
    name: E2E Tests
    needs: test-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Build Electron app
        run: electron-vite build

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  test-runbooks:
    name: Runbook Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile test CLI
        run: bun build --compile --outfile resources/bin/runbooks-test cli/index.ts

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.RUNBOOKS_TEST_AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Export test credentials
        env:
          ORIG_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          ORIG_SECRET: ${{ env.AWS_SECRET_ACCESS_KEY }}
          ORIG_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
          ORIG_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "RUNBOOKS_TEST_AWS_ACCESS_KEY_ID=${ORIG_KEY_ID}" >> "$GITHUB_ENV"
          echo "RUNBOOKS_TEST_AWS_SECRET_ACCESS_KEY=${ORIG_SECRET}" >> "$GITHUB_ENV"
          echo "RUNBOOKS_TEST_AWS_SESSION_TOKEN=${ORIG_TOKEN}" >> "$GITHUB_ENV"
          echo "RUNBOOKS_TEST_AWS_REGION=${ORIG_REGION}" >> "$GITHUB_ENV"

      - name: Run runbook tests
        env:
          RUNBOOKS_GITHUB_TOKEN: ${{ secrets.RUNBOOKS_GITHUB_TOKEN }}
        run: resources/bin/runbooks-test test testdata/...

  test-docs:
    name: Documentation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install docs dependencies
        working-directory: ./docs
        run: bun install

      - name: Run spellcheck
        working-directory: ./docs
        run: bun run spellcheck

      - name: Build docs
        working-directory: ./docs
        run: bun run build

      - name: Run link check
        working-directory: ./docs
        run: bun run linkcheck

  ci-summary:
    name: CI Summary
    needs: [lint-typecheck, test-unit, test-build, test-e2e, test-runbooks, test-docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        env:
          LINT_RESULT: ${{ needs.lint-typecheck.result }}
          UNIT_RESULT: ${{ needs.test-unit.result }}
          BUILD_RESULT: ${{ needs.test-build.result }}
          E2E_RESULT: ${{ needs.test-e2e.result }}
          RUNBOOKS_RESULT: ${{ needs.test-runbooks.result }}
          DOCS_RESULT: ${{ needs.test-docs.result }}
        run: |
          for result in "$LINT_RESULT" "$UNIT_RESULT" "$BUILD_RESULT" "$E2E_RESULT" "$RUNBOOKS_RESULT" "$DOCS_RESULT"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "CI failed!"
              exit 1
            fi
          done
          echo "All checks passed!"
