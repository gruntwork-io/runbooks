version: '3'

tasks:
  build:
    desc: Build the complete binary with embedded frontend (set MIXPANEL_TOKEN env var to enable telemetry)
    deps: [build:frontend]
    cmds:
      - go build -ldflags="-X 'github.com/gruntwork-io/runbooks/api/telemetry.MixpanelToken={{.MIXPANEL_TOKEN}}'" -o gruntbooks .
    sources:
      - "**/*.go"
      - web/dist/**/*
    generates:
      - gruntbooks

  build:frontend:
    desc: Build the frontend (creates web/dist)
    dir: web
    env:
      VITE_MIXPANEL_TOKEN: "{{.MIXPANEL_TOKEN}}"
    cmds:
      - bun install
      - bun run build
    sources:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.css"
      - package.json
    generates:
      - dist/**/*

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf web/dist
      - rm -f gruntbooks

  dev:frontend:
    desc: "Run the frontend dev server (Vite) - use with dev:backend in another terminal"
    dir: web
    cmds:
      - bun run dev

  dev:backend:
    desc: "Run the backend API server - usage: task dev:backend GRUNTBOOK_PATH=path/to/gruntbook"
    cmds:
      - go run . serve {{.GRUNTBOOK_PATH | default "testdata/my-first-gruntbook"}}

  desktop:dev:
    desc: "Build the frontend and launch the Wails v3 desktop window (M1 preview)"
    deps: [build:frontend]
    cmds:
      # Build to a capitalized executable so macOS reads "Gruntbooks" in the
      # menu bar. Without a .app bundle, macOS derives the app name from the
      # process binary filename — not from Wails' Options.Name.
      - mkdir -p bin
      - go build -o bin/Gruntbooks .
      - ./bin/Gruntbooks desktop

  desktop:build:mac:
    desc: "Build a macOS binary with Wails v3 desktop entry point embedded (M1 preview, no .app bundle yet)"
    deps: [build:frontend]
    cmds:
      - mkdir -p bin
      - go build -o bin/Gruntbooks .
    generates:
      - bin/Gruntbooks

  test:
    desc: Run all tests (frontend, backend, gruntbooks, and docs)
    cmds:
      - task: test:backend
      - task: test:frontend
      - task: test:gruntbooks
      - task: test:docs

  test:backend:
    desc: Run Go backend tests
    cmds:
      - go test ./...

  test:frontend:
    desc: Run frontend tests (vitest)
    dir: web
    cmds:
      - bun install
      - bun run test

  test:docs:
    desc: Run docs tests (spellcheck and broken link check)
    dir: docs
    cmds:
      - bun install
      - bun run spellcheck
      - bun run build
      - bun run linkcheck

  test:gruntbooks:
    desc: Run automated tests for demo gruntbooks
    deps: [build]
    cmds:
      - ./gruntbooks test ./testdata/... {{.CLI_ARGS}}

  test:e2e:
    desc: Run Playwright end-to-end tests
    deps: [build]
    dir: web
    cmds:
      - bun install
      - bunx playwright test

  docs:spellcheck:
    desc: Run spellcheck on documentation
    dir: docs
    cmds:
      - bun install
      - bun run spellcheck

  docs:linkcheck:
    desc: Check for broken links in documentation (builds first)
    dir: docs
    cmds:
      - bun install
      - bun run build
      - bun run linkcheck
