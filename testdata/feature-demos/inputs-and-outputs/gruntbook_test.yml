# Test configuration for inputs-and-outputs
# Generated by: gruntbooks test init
# Edit this file to customize your tests.

version: 1

settings:
  # Generate files to a temp directory (cleaned up after test)
  use_temp_working_dir: true
  # Working directory for script execution (default: temp directory)
  # working_dir: "."  # Use "." for gruntbook directory, or specify a path
  # Test timeout
  timeout: 5m
  # Can this gruntbook's tests run in parallel with others?
  parallelizable: true

tests:
  - name: happy-path
    description: Standard successful execution

    inputs:
      # Override to avoid conflict with the "overrides" Inputs block which
      # also defines "branch" (with a non-existent ref). Since buildTemplateVars
      # flattens all Inputs blocks into one namespace, the override would win.
      overrides.branch: main

    steps:
      - block: clone-from-inputs
      - block: clone-merged
        expect: skip
