version: 1

settings:
  use_temp_working_dir: true
  timeout: 2m
  parallelizable: true

tests:
  - name: mise-and-infra-simple
    description: |
      mise-config Template generates .mise.toml with the chosen OpenTofu and
      Terragrunt versions; infra-live-elements Template generates
      subfolder/sample.hcl with the chosen name_prefix. Backend coverage for
      the first Playwright "renders demo2" body.
    inputs:
      mise-config-inputs.OpenTofuVersion: "1"
      mise-config-inputs.TerragruntVersion: "2"
      infra-live-elements-inputs.OrgNamePrefix: "my_prefix"
      infra-live-elements-inputs.AWSAccounts: {}
      infra-live-elements-inputs.DefaultTags: {}
      infra-live-elements-inputs.CatalogRepositories: []
    steps:
      # Only exercise the two Template blocks. Skip environment checks,
      # GitHub-dependent commands, and unrelated blocks.
      - block: check-gh-install
        expect: skip
      - block: install-gh-latest-version
        expect: skip
      - block: check-mise-install
        expect: skip
      - block: create-infrastructure-live-root-repo
        expect: skip
      - block: check-infrastructure-live-root-repo
        expect: skip
      - block: lookup-latest-versions-of-opentofu-and-terragrunt
        expect: skip
      - block: test-command1
        expect: skip
      - block: mise-config-inputs
        expect: success
      - block: ci-workflow-preview
        expect: skip
      - block: infra-live-elements-inputs
        expect: success
      - block: create-pull-request-with-changes
        expect: skip
    assertions:
      - type: file_contains
        path: subfolder/sample.hcl
        contains: 'name_prefix    = "my_prefix"'
      # TODO: also assert .mise.toml contents once the runbooks-test executor
      # stops skipping hidden files (cli/test/executor.ts renderTemplateDir).
      # Dotfile contents are still covered by the Playwright demo2 test.

  - name: infra-large-form
    description: |
      Exercise the full infra-live-elements input set: AWSAccounts map entry,
      non-default DefaultRegion, custom RootTerragruntFileName. Backend
      coverage for the second Playwright "renders the large input form"
      body.
    inputs:
      infra-live-elements-inputs.OrgNamePrefix: "acme"
      infra-live-elements-inputs.DefaultRegion: "eu-west-1"
      infra-live-elements-inputs.RootTerragruntFileName: "terragrunt2.hcl"
      infra-live-elements-inputs.AddAdditionalCommonVariables: true
      infra-live-elements-inputs.AWSAccounts:
        dev-account:
          email: "dev@example.com"
          environment: "development"
          id: "111222333444"
      infra-live-elements-inputs.DefaultTags: {}
      infra-live-elements-inputs.CatalogRepositories: []
      infra-live-elements-inputs.CatalogTags: ""
      # mise-config-inputs is skipped in steps below, but TerragruntVersion is
      # required — supply a placeholder so validation doesn't reject the case.
      mise-config-inputs.TerragruntVersion: "latest"
    steps:
      - block: check-gh-install
        expect: skip
      - block: install-gh-latest-version
        expect: skip
      - block: check-mise-install
        expect: skip
      - block: create-infrastructure-live-root-repo
        expect: skip
      - block: check-infrastructure-live-root-repo
        expect: skip
      - block: lookup-latest-versions-of-opentofu-and-terragrunt
        expect: skip
      - block: test-command1
        expect: skip
      - block: mise-config-inputs
        expect: skip
      - block: ci-workflow-preview
        expect: skip
      - block: infra-live-elements-inputs
        expect: success
      - block: create-pull-request-with-changes
        expect: skip
    assertions:
      - type: file_contains
        path: common.hcl
        contains: 'name_prefix    = "acme"'
      - type: file_contains
        path: common.hcl
        contains: 'default_region = "eu-west-1"'
      # TODO: accounts.yml and the custom RootTerragruntFileName output aren't
      # verifiable yet — the simplified renderGoTemplate in cli/test/executor.ts
      # doesn't support {{ range }} or filename-template substitution. AWSAccounts
      # content is still covered by the Playwright demo2 "large form" test.

