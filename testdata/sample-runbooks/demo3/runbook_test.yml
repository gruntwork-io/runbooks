version: 1

settings:
  use_temp_working_dir: true
  timeout: 2m
  parallelizable: true

tests:
  - name: command-with-embedded-inputs
    description: |
      test6-command runs with embedded inputs from test6-inputs and succeeds.
      Backend coverage for the Playwright "runs a command with embedded
      inputs and shows success" body.
    inputs:
      test6-inputs.ProjectName: "my-awesome-project"
      test6-inputs.AuthorName: "Developer"
      # test2 inputs are required by other blocks; supply safe defaults
      test2.GithubOrgName: "gruntwork-io"
      test2.GithubRepoName: "runbooks-infrastructure-live-example"
    steps:
      # Skip every block except test6-command.
      - block: test1
        expect: skip
      - block: test3-template
        expect: skip
      - block: test4-template
        expect: skip
      - block: test5
        expect: skip
      - block: test6-command
        expect: success
      - block: test7-template
        expect: skip

  - name: template-generates-common-hcl
    description: |
      test1 Template (templates/infra-live-elements) produces common.hcl with
      the chosen name_prefix. Backend coverage for the Playwright
      "generates files from Template block and shows them in file panel"
      body.
    inputs:
      test1.OrgNamePrefix: "demo3_prefix"
      test1.AddAdditionalCommonVariables: true
      test1.AWSAccounts: {}
      test1.DefaultTags: {}
      test1.CatalogRepositories: []
      test1.CatalogTags: ""
      # Required inputs for blocks we skip
      test2.GithubOrgName: "gruntwork-io"
      test2.GithubRepoName: "runbooks-infrastructure-live-example"
    steps:
      - block: test1
        expect: success
      - block: test3-template
        expect: skip
      - block: test4-template
        expect: skip
      - block: test5
        expect: skip
      - block: test6-command
        expect: skip
      - block: test7-template
        expect: skip
    assertions:
      - type: file_exists
        path: common.hcl
      - type: file_contains
        path: common.hcl
        contains: 'name_prefix    = "demo3_prefix"'
