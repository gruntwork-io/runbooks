version: 1

settings:
  use_temp_working_dir: true
  timeout: 1m
  parallelizable: true

tests:
  - name: happy-path
    description: |
      Standard successful execution with fuzzed inputs. Environment checks
      are skipped because they verify the host machine, not runbook logic.
    inputs:
      git-version-inputs.GitVersion: "2.50.1"
      project.ProjectName:
        fuzz:
          type: string
          minLength: 5
          maxLength: 20
      project.Author:
        fuzz:
          type: string
          minLength: 5
          maxLength: 20
      project.Language:
        fuzz:
          type: enum
          options: ["Go", "Python", "JavaScript", "TypeScript", "Rust"]
    steps:
      - block: check-git
        expect: skip
      - block: check-git-version
        expect: skip
      - block: project
        expect: success
      - block: run-setup
        expect: success
      - block: final-message
        expect: success

  - name: template-renders-inputs-into-readme
    description: |
      The project Template renders ProjectName, Author, and Language into
      README.md. Backend coverage for the Playwright "generates template
      files and shows them in the file panel" body.
    inputs:
      git-version-inputs.GitVersion: "2.50.1"
      project.ProjectName: "test-project"
      project.Author: "Alice"
      project.Language: "Go"
    steps:
      - block: check-git
        expect: skip
      - block: check-git-version
        expect: skip
      - block: project
        expect: success
      - block: run-setup
        expect: skip
      - block: final-message
        expect: skip
    assertions:
      - type: file_exists
        path: README.md
      - type: file_contains
        path: README.md
        contains: "test-project"
      - type: file_contains
        path: README.md
        contains: "Alice"
      - type: file_contains
        path: README.md
        contains: "Go"
