# Test configuration for OpenClaw runbook
# This runbook interacts with external services (AWS, Tailscale, Terragrunt).
# Currently only testing template generation; script tests to be added in future PR.

version: 1

settings:
  use_temp_working_dir: true
  timeout: 5m
  parallelizable: true

tests:
  - name: template-validation
    description: Validate template generation without external service calls

    inputs:
      openclaw-config.Environment: "non-prod"
      openclaw-config.AwsRegion: "us-west-2"
      openclaw-config.InstanceName: "openclaw"
      openclaw-config.InstanceType: "t4g.medium"
      openclaw-config.VolumeSize: 30
      openclaw-config.AllowedSshCidr: "0.0.0.0/0"
      openclaw-config.TailscaleAuthKey: "tskey-auth-test1234567890"
      openclaw-config.OpenClawVersion: "latest"
      openclaw-config.GatewayPort: 18789

    steps:
      - block: aws-auth
        expect: skip
      - block: check-mise
        expect: skip
      - block: install-tools
        expect: skip
      - block: openclaw-config
        expect: success
      - block: terragrunt-plan
        expect: skip
      - block: terragrunt-apply
        expect: skip
      - block: test-openclaw
        expect: skip
      - block: terragrunt-destroy
        expect: skip

    assertions:
      - type: files_generated
        block: openclaw-config
        min_count: 1
      - type: file_exists
        path: terragrunt.hcl
      - type: file_contains
        path: terragrunt.hcl
        contains: "openclaw-non-prod"
      - type: file_exists
        path: modules/openclaw-ec2/main.tf
      - type: file_exists
        path: modules/openclaw-ec2/variables.tf
      - type: file_exists
        path: modules/openclaw-ec2/outputs.tf
      - type: file_exists
        path: modules/openclaw-ec2/user_data.sh.tftpl
