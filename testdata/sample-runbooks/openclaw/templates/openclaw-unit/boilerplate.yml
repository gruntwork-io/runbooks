variables:
  - name: Environment
    type: enum
    description: Target environment for deployment
    options:
      - non-prod
      - prod
    default: non-prod
    x-section: Deployment Settings

  - name: AwsRegion
    type: enum
    options:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-central-1
      - eu-west-1
      - eu-west-2
    description: The AWS region to deploy OpenClaw to
    default: "us-west-2"
    validations:
      - required
    x-section: Deployment Settings

  - name: InstanceName
    type: string
    description: Name for the OpenClaw EC2 instance (used in resource tags and Tailscale hostname)
    default: openclaw
    validations:
      - required
    x-section: Instance Settings

  - name: InstanceType
    type: enum
    description: "EC2 instance type. Graviton (t4g) instances are ~20% cheaper than x86 (t3)."
    options:
      - t4g.small
      - t4g.medium
      - t3.small
      - t3.medium
    default: t4g.medium
    validations:
      - required
    x-section: Instance Settings

  - name: VolumeSize
    type: int
    description: Root EBS volume size in GB (minimum 20 recommended for Docker images)
    default: 30
    validations:
      - required
    x-section: Instance Settings

  - name: KeyPairName
    type: string
    description: Name of an existing EC2 key pair for SSH access (create one in the EC2 Console if needed)
    validations:
      - required
    x-section: Network Settings

  - name: AllowedSshCidr
    type: string
    description: CIDR block allowed to SSH into the instance (e.g., your office IP). Use 0.0.0.0/0 to allow all.
    default: "0.0.0.0/0"
    validations:
      - required
    x-section: Network Settings

  - name: TailscaleAuthKey
    type: string
    description: "Tailscale pre-authentication key. Generate at: Tailscale Admin > Settings > Keys > Generate auth key"
    validations:
      - required
    x-section: Tailscale Settings

  - name: OpenClawVersion
    type: string
    description: OpenClaw Docker image tag (use 'latest' for the most recent release)
    default: "latest"
    x-section: OpenClaw Settings

  - name: GatewayPort
    type: int
    description: Port for the OpenClaw gateway (default 18789)
    default: 18789
    x-section: OpenClaw Settings
