variables:
  - name: SupabaseUrl
    description: "Supabase project URL (from the Configure Supabase Auth step)"
    type: string
    default: "https://xyzcompany.supabase.co"

  - name: SupabaseAnonKey
    description: "Supabase anonymous/public key"
    type: string
    default: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock-anon-key"

  - name: LangSmithApiKey
    description: "LangSmith API key for telemetry and traces"
    type: string
    default: "ls-mock-api-key-00000000"

  - name: PineconeApiKey
    description: "Pinecone API key for vector database"
    type: string
    default: "pc-mock-api-key-00000000"

  - name: PineconeEnvironment
    description: "Pinecone environment"
    type: string
    default: "us-east-1-aws"

  - name: UpstashRedisUrl
    description: "Upstash Redis connection URL for caching and rate limiting"
    type: string
    default: "redis://default:mock-token@us1-mock-redis.upstash.io:6379"

  - name: LlmProvider
    description: "LLM provider for the conversation service"
    type: enum
    options:
      - anthropic
      - openai
      - azure-openai
    default: "anthropic"
