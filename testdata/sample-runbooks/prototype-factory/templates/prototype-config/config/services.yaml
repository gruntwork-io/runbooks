# ============================================================
# {{ .ProjectName }} — Service Registry
# Generated by the Prototype Factory runbook
# ============================================================
#
# This file defines the service topology for the prototype.
# Each service has a contract interface and a current implementation.
# Swap implementations by changing the `provider` field — the
# contract stays the same.

project:
  name: {{ .ProjectName }}
  description: {{ .ProjectDescription }}

services:
  auth:
    contract: AuthContext
    provider: supabase
    config:
      url: {{ .SupabaseUrl }}
      oauth_provider: microsoft
      org_domain_gating: true
    swap_target: auth0

  conversation:
    contract: ConversationOrchestrator
    provider: fastapi
    config:
      llm_provider: {{ .LlmProvider }}
      prompt_registry: local
      max_tokens: 4096
    swap_target: lambda

  content:
    contract: ContentService
    provider: fastapi
    config:
      citation_schema: "work_id + locator + snippet + context_window"
      deep_link: true
    swap_target: ts-lambda

  retrieval:
    contract: RetrievalProvider
    provider: pinecone
    config:
      environment: {{ .PineconeEnvironment }}
      index: {{ .ProjectName }}-index
      dimensions: 1536
      metric: cosine
      metadata_filters:
        - teacher
        - collection
        - topic
    swap_target: databricks-vector-search

  cache:
    contract: CacheProvider
    provider: upstash-redis
    config:
      url: {{ .UpstashRedisUrl }}
      rate_limit:
        per_user_rpm: 60
        per_org_rpd: 1000
      retrieval_cache_ttl: 3600
    swap_target: elasticache

  telemetry:
    contract: TelemetryProvider
    provider: langsmith
    config:
      project: {{ .ProjectName }}
      trace_schema: true
      feedback_tags: true
      golden_set_eval: true
      log_redaction: true
    swap_target: databricks-trace-events
